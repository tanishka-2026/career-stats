<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skillscape</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <!-- Profile Section -->

        <div class="profile">

            <div class="avatar-ring">
                <img src="C:\Users\HP\Downloads\Frame 2 (3).png" alt="Profile">
            </div>

            <div class="profile-info">
                <p>Good day 👑</p>
                <h2>Jessica Thomas</h2>
            </div>

        </div>

        <hr>

        <!-- Menu Heading -->

        <div class="menu-head">
            <p>Menu</p>
        </div>

        <!-- Main Menu Card -->

        <div class="menu">
          
          <div class="menu-row">
          
            <div class="menu-item">
                <img src="C:\Users\HP\Downloads\icon.png" alt="">
                <p>Dashboard</p>
            </div>
          </div>
            
          <div class="menu-row">

            <div class="menu-item">
                <img src="C:\Users\HP\Downloads\Icon 2.png" alt="">
                <p>Edit Profile</p>
            </div>

              <span class="plus">+</span>
          </div>
            
          <div class="menu-row">

            <div class="menu-item">
                <img src="C:\Users\HP\Downloads\Icon 3.png" alt="">
                <p>Settings</p>
            </div>

          </div>
        </div>

        <!-- Secondary Menu -->

        <div class="menu2">

            <div class="menu-row">

                <div class="menu-item">
                    <img src="C:\Users\HP\Downloads\Icon (1).png" alt="">
                    <p>Notifications</p>
                </div>

                <span class="badge">3</span>

            </div>
 
            <div class="menu-row">

              <div class="menu-item">
                <img src="C:\Users\HP\Downloads\Search.png" alt="">
                <p>Search</p>
              </div>
            </div>

            <div class="menu-row">

              <div class="menu-item">
                <img src="C:\Users\HP\Downloads\Union.png" alt="">
                <p>Mails</p>
              </div>

              <span class="plus">+</span>
            </div>

        </div>

        <div class="card">
            <div class="blue-circle">
              <div class="plus-button"></div>
            </div>

            <div class="card-content">
              <p>Create new Stats</p>
            </div>
            <div class="card-description">
                <p>Subscribe to</p> 
                <div class="skillscape">
                <p>Skillscape </p>
                </div>
                <div class="premium">
                <p> to fasten your analysis</p>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
